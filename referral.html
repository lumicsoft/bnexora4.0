<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Referrals | Bnexora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #9d34da; --secondary: #eb1e8c; --dark-bg: #0d0118; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: radial-gradient(circle at 10% 20%, rgba(157, 52, 218, 0.1) 0%, transparent 40%);
        }
        .glass-card {
            background: rgba(25, 10, 45, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
        }
        .table-row:hover { background: rgba(255, 255, 255, 0.03); }
        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-black italic tracking-tight">DIRECT <span class="text-pink-500">PARTNERS</span></h1>
                <p class="text-gray-400 text-sm mt-1">Manage and track your primary network performance</p>
            </div>
            <div class="flex gap-3">
               
            </div>
        </div>

        <!-- Quick Stats Area -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 bg-gradient-to-br from-purple-600/10 to-transparent">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">Total Directs</p>
                <h2 class="text-3xl font-black" id="total-directs-count">0</h2>
            </div>
            <div class="glass-card p-6 bg-gradient-to-br from-pink-600/10 to-transparent">
               <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">Total Team</p>
                <h2 class="text-3xl font-black" id="all-team">0</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-pink-500">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">Registration Mode</p>
                <h2 class="text-xl font-black">Wallet Address</h2>
            </div>
        </div>

        <!-- Referrals Table -->
        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                <h3 class="font-bold flex items-center gap-2">
                    <i data-lucide="users" class="text-pink-500 w-5 h-5"></i>
                    Partner List
                </h3>
                <span class="text-[10px] text-gray-500 italic">Data synced with Smart Contract</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase tracking-widest border-b border-white/5">
                            <th class="p-6">User ID</th>
                            <th class="p-6">Wallet Address</th>
                            <th class="p-6 text-center">Current Level</th>
                            <th class="p-6 text-center">Team Size</th>
                            <th class="p-6 text-center">Rank</th>
                            <th class="p-6">Reg. Date</th>
                        </tr>
                    </thead>
                    <tbody id="referrals-table-body">
                        <!-- Data will load here dynamically -->
                        <tr>
                            <td colspan="6" class="p-20 text-center text-gray-500">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-pink-500"></div>
                                    <p class="text-xs font-bold uppercase tracking-widest">Scanning Blockchain...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
<script src="components.js"></script>
    <script src="web3-handler.js"></script>
    <script>
        async function loadReferrals() {
            lucide.createIcons();
            if (typeof init === 'function') await init();

            try {
                const userAddress = await signer.getAddress();
                
                // 1. Get List of Direct Partner Addresses
                const partners = await contract.getDirectPartnerAddresses(userAddress);
                document.getElementById('total-directs-count').innerText = partners.length;

                const tableBody = document.getElementById('referrals-table-body');
                tableBody.innerHTML = '';

                if (partners.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="p-20 text-center text-gray-500 text-xs">No direct partners found yet.</td></tr>';
                    return;
                }

                // 2. Loop through each partner to get their individual details
                for (let partnerAddr of partners) {
                    const details = await contract.getUserDetailsByAddress(partnerAddr);
                    
                    const row = document.createElement('tr');
                    row.className = 'table-row border-b border-white/5 transition';
                    
                    const date = new Date(details.registrationTimestamp * 1000).toLocaleDateString();
                    
                    row.innerHTML = `
                        <td class="p-6">
                            <span class="bg-white/5 px-3 py-1 rounded-lg text-xs font-bold">#${details.id}</span>
                        </td>
                        <td class="p-6">
                            <div class="flex flex-col">
                                <span class="text-xs font-mono text-gray-300">${partnerAddr.substring(0,6)}...${partnerAddr.substring(38)}</span>
                                <span class="status-badge w-fit mt-1">Verified</span>
                            </div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="text-pink-500 font-black">Lvl ${details.activeSlotsCount}</span>
                        </td>
                        <td class="p-6 text-center">
                            <span class="font-bold text-gray-300">${details.teamSize} Members</span>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-2 py-1 bg-purple-500/20 border border-purple-500/30 rounded text-[10px] font-bold text-purple-400">V${details.rank}</span>
                        </td>
                        <td class="p-6">
                            <span class="text-xs text-gray-500">${date}</span>
                        </td>
                    `;
                    tableBody.appendChild(row);
                }

            } catch (err) {
                console.error("Referral Page Error:", err);
            }
        }

        window.addEventListener('load', loadReferrals);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Tree | Bnexora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #9d34da; 
            --secondary: #eb1e8c; 
            --dark-bg: #0d0118; 
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: radial-gradient(circle at 50% 50%, rgba(157, 52, 218, 0.15) 0%, transparent 80%);
        }
        .glass-card {
            background: rgba(25, 10, 45, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            height: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(235, 30, 140, 0.3);
            border-radius: 10px;
        }
        
        .tree-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 1.5rem; 
            padding: 20px; 
            min-w: 640px; 
        }
        .node {
            width: 46px; 
            height: 46px; 
            border-radius: 50%;
            background: #1e0533; 
            border: 2px solid #9d34da;
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .node.active { 
            background: linear-gradient(135deg, #eb1e8c, #9d34da); 
            border-color: #fff; 
            box-shadow: 0 0 20px #eb1e8c, inset 0 0 5px rgba(255,255,255,0.4); 
        }
        .level-row { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            width: 100%; 
        }
        .connector { 
            height: 24px; 
            width: 2px; 
            background: linear-gradient(to bottom, rgba(157, 52, 218, 0.6), rgba(235, 30, 140, 0.2)); 
        }
        
        .pkg-btn { 
            padding: 12px 24px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            cursor: pointer; 
            transition: all 0.3s ease;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(255,255,255,0.03);
            white-space: nowrap;
        }
        .pkg-btn.active { 
            background: linear-gradient(135deg, #eb1e8c 0%, #9d34da 100%); 
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 15px rgba(235, 30, 140, 0.4);
        }
        .pkg-btn.locked {
            opacity: 0.35;
            filter: grayscale(100%);
            cursor: not-allowed !important;
            background: rgba(0,0,0,0.4);
            border-color: transparent;
        }
    </style>
</head>
<body class="p-3 md:p-6">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-2">
            <div>
                <h1 class="text-2xl font-black italic tracking-wide">MATRIX <span class="text-pink-500">VIEW</span></h1>
                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mt-0.5">Structural Placement Line</p>
            </div>
           
        </div>

        <!-- FIX 1: Static Placeholder Buttons pehle se hi HTML mein rahenge taaki empty area na dikhe -->
        <div class="glass-card p-4 overflow-x-auto custom-scrollbar">
            <div class="flex gap-3" id="package-list">
                <!-- JavaScript inko refresh karke live status ke sath override karega -->
                <button class="pkg-btn locked">Slot 1</button>
                <button class="pkg-btn locked">Slot 2</button>
                <button class="pkg-btn locked">Slot 3</button>
                <button class="pkg-btn locked">Slot 4</button>
                <button class="pkg-btn locked">Slot 5</button>
                <button class="pkg-btn locked">Slot 6</button>
                <button class="pkg-btn locked">Slot 7</button>
                <button class="pkg-btn locked">Slot 8</button>
                <button class="pkg-btn locked">Slot 9</button>
                <button class="pkg-btn locked">Slot 10</button>
                <button class="pkg-btn locked">Slot 11</button>
                <button class="pkg-btn locked">Slot 12</button>
            </div>
        </div>

        <!-- Matrix Info Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="glass-card p-5 text-center relative overflow-hidden">
                <p class="text-[10px] text-gray-400 uppercase font-extrabold tracking-wider mb-1">Recycle Count</p>
                <h3 class="text-2xl font-black tracking-tight" id="recycle-count">--</h3>
            </div>
            <div class="glass-card p-5 text-center relative overflow-hidden border-b-2 border-pink-500">
                <p class="text-[10px] text-gray-400 uppercase font-extrabold tracking-wider mb-1">Matrix Earnings</p>
                <h3 class="text-2xl font-black text-pink-500 tracking-tight" id="matrix-earnings">0.00 USDT</h3>
            </div>
            <div class="glass-card p-5 text-center relative overflow-hidden border-b-2 border-yellow-500">
                <p class="text-[10px] text-gray-400 uppercase font-extrabold tracking-wider mb-1">Held for Upgrade</p>
                <h3 class="text-2xl font-black text-yellow-500 tracking-tight" id="held-tokens">0.00 USDT</h3>
            </div>
        </div>

        <!-- FIX 2: Static Layout structure grid predefined hai, load hone par gayab nahi hoga -->
        <div class="glass-card min-h-[520px] flex flex-col items-center justify-center p-4 md:p-8 overflow-hidden">
            <div class="w-full overflow-x-auto custom-scrollbar py-6">
                <div id="tree-root" class="tree-container">
                    <!-- Node 0 (Root) -->
                    <div class="node active font-black text-[10px] tracking-wider" id="node-0">YOU</div>
                    <div class="connector"></div>
                    
                    <!-- Level 1 (2 nodes) -->
                    <div class="level-row" id="row-1">
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">1</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">2</span></div>
                    </div>
                    <div class="connector"></div>
                    
                    <!-- Level 2 (4 nodes) -->
                    <div class="level-row" id="row-2">
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">3</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">4</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">5</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">6</span></div>
                    </div>
                    <div class="connector"></div>
                    
                    <!-- Level 3 (8 nodes) -->
                    <div class="level-row" id="row-3">
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">7</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">8</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">9</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">10</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">11</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">12</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">13</span></div>
                        <div class="node"><span class="text-[9px] text-gray-600 font-bold">14</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="components.js"></script>
    <script src="web3-handler.js"></script>
    <script>
        let userSlotsState = {};
        let selectedSlot = 1;

        async function initMatrixView() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
            
            if (typeof init === 'function' && (!window.signer || !window.contract)) {
                await init();
            }

            if (!window.signer || !window.contract) {
                console.log("Waiting for contract architecture...");
                setTimeout(initMatrixView, 1000);
                return;
            }

            try {
                const userAddress = await window.signer.getAddress();
                
                // Pure 12 slots ka status chain state check
                for (let i = 1; i <= 12; i++) {
                    const isActive = await window.contract.isUserSlotActiveByAddress(userAddress, i);
                    userSlotsState[i] = isActive;
                }

                renderPackageButtons();
                
                // Find default selection slot node
                for(let i = 1; i <= 12; i++) {
                    if(userSlotsState[i]) {
                        selectedSlot = i;
                        break;
                    }
                }
                
                // Highlight active button array
                const activeBtn = document.getElementById(`pkg-${selectedSlot}`);
                if(activeBtn) activeBtn.classList.add('active');

                await loadMatrixData(selectedSlot);

            } catch (err) {
                console.error("Matrix view parsing fault tracker:", err);
                renderPackageButtons();
                loadMatrixData(1);
            }
        }

        function renderPackageButtons() {
            const container = document.getElementById('package-list');
            container.innerHTML = '';
            
            for(let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                const isActivated = userSlotsState[i] !== undefined ? userSlotsState[i] : (i === 1);
                
                btn.id = `pkg-${i}`;
                if (isActivated) {
                    btn.className = `pkg-btn ${i === selectedSlot ? 'active' : ''}`;
                    btn.innerHTML = `<span class="flex items-center gap-1.5"><i data-lucide="layers" class="w-3.5 h-3.5"></i> Slot ${i}</span>`;
                    btn.onclick = () => {
                        document.querySelectorAll('.pkg-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedSlot = i;
                        loadMatrixData(i);
                    };
                } else {
                    btn.className = 'pkg-btn locked';
                    btn.innerHTML = `<span class="flex items-center gap-1.5 text-gray-500"><i data-lucide="lock" class="w-3.5 h-3.5"></i> Slot ${i}</span>`;
                    btn.onclick = (e) => {
                        e.preventDefault();
                        return false;
                    };
                }
                container.appendChild(btn);
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        async function loadMatrixData(level) {
            try {
                const address = await window.signer.getAddress();
                
                const matrixInfo = await window.contract.usersXMatrix(address, level);
                document.getElementById('recycle-count').innerText = matrixInfo.reinvestCount.toString();
                document.getElementById('held-tokens').innerText = parseFloat(ethers.utils.formatUnits(matrixInfo.heldTokenForUpgrade, 18)).toFixed(2) + " USDT";
                document.getElementById('matrix-earnings').innerText = parseFloat(ethers.utils.formatUnits(matrixInfo.totalEarning, 18)).toFixed(2) + " USDT";

                const referrals = await window.contract.usersXMatrixReferrals(address, level);
                renderTree(referrals);

            } catch (err) {
                console.error("Matrix node matrix load mapping break:", err);
            }
        }

        function renderTree(refs) {
            renderRow('row-1', 2, refs, 0);  
            renderRow('row-2', 4, refs, 2);  
            renderRow('row-3', 8, refs, 6);  
        }

        function renderRow(rowId, count, refs, offset) {
            const row = document.getElementById(rowId);
            row.innerHTML = '';
            for(let i = 0; i < count; i++) {
                const nodeIdx = offset + i;
                const node = document.createElement('div');
                const isFilled = refs[nodeIdx] && refs[nodeIdx] !== "0x0000000000000000000000000000000000000000";
                
                node.className = `node ${isFilled ? 'active' : ''}`;
                
                if (isFilled) {
                    node.setAttribute('title', refs[nodeIdx]);
                    node.innerHTML = `<i data-lucide="user" class="w-3.5 h-3.5 text-white animate-pulse"></i>`;
                } else {
                    node.setAttribute('title', 'Available Slot Node');
                    node.innerHTML = `<span class="text-[9px] text-gray-600 font-bold">${offset + i + 1}</span>`;
                }
                row.appendChild(node);
            }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        window.addEventListener('load', initMatrixView);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Tree | Bnexora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #9d34da; --secondary: #eb1e8c; --dark-bg: #0d0118; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: radial-gradient(circle at 50% 50%, rgba(157, 52, 218, 0.1) 0%, transparent 80%);
        }
        .glass-card {
            background: rgba(25, 10, 45, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
        }
        /* Tree Visuals */
        .tree-container { display: flex; flex-direction: column; align-items: center; gap: 2rem; padding: 20px; overflow-x: auto; }
        .node {
            width: 50px; height: 50px; border-radius: 50%;
            background: #1e0533; border: 2px solid #9d34da;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; position: relative; transition: all 0.3s;
        }
        .node.active { background: linear-gradient(135deg, #eb1e8c, #9d34da); border-color: #fff; box-shadow: 0 0 15px #eb1e8c; }
        .level-row { display: flex; justify-content: center; gap: 10px; width: 100%; }
        .connector { height: 20px; width: 2px; background: rgba(255,255,255,0.2); }
        .pkg-btn { padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .pkg-btn.active { background: #eb1e8c; border-color: #fff; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black">Matrix <span class="text-pink-500">View</span></h1>
            <a href="index1.html" class="glass-card px-6 py-2 text-sm flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
            </a>
        </div>

        <!-- Package Selector -->
        <div class="glass-card p-4 mb-8 overflow-x-auto">
            <div class="flex gap-3" id="package-list">
                <!-- Level 1 to 12 Buttons will load here -->
            </div>
        </div>

        <!-- Matrix Info Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 text-center">
                <p class="text-xs text-gray-400 uppercase">Recycle Count</p>
                <h3 class="text-2xl font-bold" id="recycle-count">0</h3>
            </div>
            <div class="glass-card p-6 text-center">
                <p class="text-xs text-gray-400 uppercase">Matrix Earnings</p>
                <h3 class="text-2xl font-bold text-pink-500" id="matrix-earnings">0.00 USDT</h3>
            </div>
            <div class="glass-card p-6 text-center">
                <p class="text-xs text-gray-400 uppercase">Held for Upgrade</p>
                <h3 class="text-2xl font-bold text-yellow-500" id="held-tokens">0.00</h3>
            </div>
        </div>

        <!-- Tree Visualization Area -->
        <div class="glass-card min-h-[600px] flex flex-col items-center justify-center p-8">
            <div id="tree-root" class="tree-container">
                <!-- Node 0 (Root) -->
                <div class="node active" id="node-0">YOU</div>
                <div class="connector"></div>
                <!-- Level 1 (2 nodes) -->
                <div class="level-row" id="row-1"></div>
                <div class="connector"></div>
                <!-- Level 2 (4 nodes) -->
                <div class="level-row" id="row-2"></div>
                <div class="connector"></div>
                <!-- Level 3 (8 nodes) -->
                <div class="level-row" id="row-3"></div>
            </div>
        </div>
    </div>

    <script src="web3-handler.js"></script>
    <script>
        let currentLevel = 1;

        // Initialize Page
        async function initMatrixView() {
            lucide.createIcons();
            if (typeof init === 'function') await init();
            
            renderPackageButtons();
            loadMatrixData(1);
        }

        function renderPackageButtons() {
            const container = document.getElementById('package-list');
            for(let i=1; i<=12; i++) {
                const btn = document.createElement('button');
                btn.className = `pkg-btn ${i===1 ? 'active' : ''}`;
                btn.id = `pkg-${i}`;
                btn.innerText = `Level ${i}`;
                btn.onclick = () => {
                    document.querySelectorAll('.pkg-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadMatrixData(i);
                };
                container.appendChild(btn);
            }
        }

        async function loadMatrixData(level) {
            try {
                const address = await signer.getAddress();
                // 1. Get Matrix Info (Recycle, Held Tokens, Earnings)
                const matrixInfo = await contract.usersXMatrix(address, level);
                document.getElementById('recycle-count').innerText = matrixInfo.reinvestCount.toString();
                document.getElementById('held-tokens').innerText = ethers.utils.formatEther(matrixInfo.heldTokenForUpgrade);
                document.getElementById('matrix-earnings').innerText = ethers.utils.formatEther(matrixInfo.totalEarning) + " USDT";

                // 2. Get Referrals array (Full 14 nodes logic)
                const referrals = await contract.usersXMatrixReferrals(address, level);
                renderTree(referrals);

            } catch (err) {
                console.error("Matrix Load Error:", err);
            }
        }

        function renderTree(refs) {
            // Row 1 (2 nodes)
            renderRow('row-1', 2, refs, 0);
            // Row 2 (4 nodes)
            renderRow('row-2', 4, refs, 2);
            // Row 3 (8 nodes)
            renderRow('row-3', 8, refs, 6);
        }

        function renderRow(rowId, count, refs, offset) {
            const row = document.getElementById(rowId);
            row.innerHTML = '';
            for(let i=0; i<count; i++) {
                const nodeIdx = offset + i;
                const node = document.createElement('div');
                const isFilled = refs[nodeIdx] && refs[nodeIdx] !== "0x0000000000000000000000000000000000000000";
                
                node.className = `node ${isFilled ? 'active' : ''}`;
                node.title = isFilled ? refs[nodeIdx] : 'Empty Slot';
                node.innerHTML = isFilled ? `<i data-lucide="user" class="w-4 h-4"></i>` : '';
                row.appendChild(node);
            }
            lucide.createIcons();
        }

        window.addEventListener('load', initMatrixView);
    </script>
</body>
</html>

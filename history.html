<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | Bnexora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #9d34da;
            --secondary: #eb1e8c;
            --dark-bg: #0d0118;
            --card-bg: rgba(25, 10, 45, 0.7);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(157, 52, 218, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(235, 30, 140, 0.1) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
        }
        .table-row:hover { background: rgba(255, 255, 255, 0.03); }
        .badge-income { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-upgrade { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-spill { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
            <div>
                <h1 class="text-2xl font-black italic">TRANSACTION <span class="text-pink-500">HISTORY</span></h1>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-wider font-bold">Real-time Blockchain Ledger</p>
            </div>
            <a href="index1.html" class="glass-card px-6 py-2.5 text-xs font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-white/5 transition">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </a>
        </div>

        <!-- Transactions Table Card -->
        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                <h3 class="font-bold flex items-center gap-2">
                    <i data-lucide="history" class="text-pink-500 w-5 h-5"></i>
                    All Income & System Logs
                </h3>
                <button onclick="loadTransactions()" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-white transition flex items-center gap-1">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh Logs
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase tracking-widest border-b border-white/5 bg-black/20">
                            <th class="p-5">#</th>
                            <th class="p-5">Level</th>
                            <th class="p-5">Date & Time</th>
                            <th class="p-5">Tx Hash</th>
                            <th class="p-5">From User ID / Address</th>
                            <th class="p-5 text-right">Income Type / Value</th>
                        </tr>
                    </thead>
                    <tbody id="tx-table-body">
                        <tr>
                            <td colspan="6" class="p-20 text-center text-gray-500">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-pink-500"></div>
                                    <p class="text-xs font-bold uppercase tracking-widest">Scanning Blockchain Logs...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="web3-handler.js"></script>
    <script>
        // ABI aapke contract ke events ke variables ke sequence ke exact mutabik hai
        const LOCAL_ABI = [
            "function addressToId(address) view returns (uint256)",
            "function idToAddress(uint256) view returns (address)",
            "function levelTokenCost(uint8) view returns (uint256)",
            "event Registration(uint256 indexed userId, uint256 indexed referrerId, address userAddress)",
            "event Upgrade(uint256 indexed userId, uint256 indexed newReferrerId, uint8 level)",
            "event Spillover(uint256 indexed referrerId, uint256 indexed receiverId, uint8 level, uint256 cycle, uint8 virtualSpot)"
        ];

        async function loadTransactions() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
            
            // Web3 core configuration fallback check
            if (typeof provider === 'undefined' && window.ethereum) {
                window.provider = new ethers.providers.Web3Provider(window.ethereum);
                window.signer = window.provider.getSigner();
            }

            try {
                const userAddress = await signer.getAddress();
                const activeContract = new ethers.Contract(CONTRACT_ADDRESS, LOCAL_ABI, signer);
                
                const myIdBtn = await activeContract.addressToId(userAddress);
                const myId = myIdBtn.toNumber();

                const tableBody = document.getElementById('tx-table-body');
                tableBody.innerHTML = '';

                const currentBlock = await provider.getBlockNumber();
                // Safe node retrieval block span limit
                const fromBlock = currentBlock - 4500 > 0 ? currentBlock - 4500 : 0;

                // Event logs fetch logic without targeted indexing constraints
                const logsReg = await activeContract.queryFilter("Registration", fromBlock, currentBlock);
                const logsUpgrade = await activeContract.queryFilter("Upgrade", fromBlock, currentBlock);
                const logsSpill = await activeContract.queryFilter("Spillover", fromBlock, currentBlock);

                let reportData = [];

                // 1. Process Registrations (Where current user is the Referrer)
                for (let log of logsReg) {
                    if (log.args.referrerId.toNumber() === myId) {
                        reportData.push({
                            blockNumber: log.blockNumber,
                            txHash: log.transactionHash,
                            level: 1,
                            fromUserAddress: log.args.userAddress,
                            fromUserId: log.args.userId.toString(),
                            type: "Direct Income",
                            badgeClass: "badge-income"
                        });
                    }
                }

                // 2. Process Upgrades (Linear hierarchy processing check)
                for (let log of logsUpgrade) {
                    const targetUser = await activeContract.idToAddress(log.args.userId);
                    if (log.args.newReferrerId.toNumber() === myId) {
                        reportData.push({
                            blockNumber: log.blockNumber,
                            txHash: log.transactionHash,
                            level: log.args.level,
                            fromUserAddress: targetUser,
                            fromUserId: log.args.userId.toString(),
                            type: "Level Upgrade",
                            badgeClass: "badge-upgrade"
                        });
                    }
                }

                // 3. Process Spillovers (Matrix structure receiver validation match)
                for (let log of logsSpill) {
                    if (log.args.receiverId.toNumber() === myId) {
                        const senderAddress = await activeContract.idToAddress(log.args.referrerId);
                        reportData.push({
                            blockNumber: log.blockNumber,
                            txHash: log.transactionHash,
                            level: log.args.level,
                            fromUserAddress: senderAddress,
                            fromUserId: log.args.referrerId.toString(),
                            type: `Spillover (Spot ${log.args.virtualSpot})`,
                            badgeClass: "badge-spill"
                        });
                    }
                }

                // Newest transactions sorting execution
                reportData.sort((a, b) => b.blockNumber - a.blockNumber);

                if (reportData.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="p-20 text-center text-gray-500 text-xs">No income data matched for this wallet in recent blocks.</td></tr>';
                    return;
                }

                let indexCounter = 1;

                for (let data of reportData) {
                    const blockDetails = await provider.getBlock(data.blockNumber);
                    const txDate = new Date(blockDetails.timestamp * 1000);
                    
                    const formattedDate = txDate.toLocaleDateString('en-US');
                    const formattedTime = txDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                    // Dynamically parse package value cost based on target event levels
                    let valueCost = "10.00 USDT";
                    if (data.level > 1) {
                        try {
                            const rawCost = await activeContract.levelTokenCost(data.level);
                            valueCost = parseFloat(ethers.utils.formatUnits(rawCost, 18)).toFixed(2) + " USDT";
                        } catch (err) { valueCost = "-- USDT"; }
                    }

                    const row = document.createElement('tr');
                    row.className = 'table-row border-b border-white/5 text-xs transition';

                    row.innerHTML = `
                        <td class="p-5 font-bold text-gray-500">${String(indexCounter++).padStart(2, '0')}</td>
                        <td class="p-5 font-black text-pink-400">Lvl ${data.level}</td>
                        <td class="p-5">
                            <div class="flex flex-col">
                                <span class="font-bold">${formattedDate}</span>
                                <span class="text-[10px] text-gray-500 mt-0.5">${formattedTime}</span>
                            </div>
                        </td>
                        <td class="p-5 font-mono text-purple-400">
                            <a href="https://testnet.bscscan.com/tx/${data.txHash}" target="_blank" class="hover:underline">
                                ${data.txHash.substring(0,6)}...${data.txHash.substring(60)}
                            </a>
                        </td>
                        <td class="p-5">
                            <div class="flex flex-col">
                                <span class="text-white font-black">ID: ${data.fromUserId}</span>
                                <span class="font-mono text-[10px] text-gray-500 mt-0.5">${data.fromUserAddress.substring(0,6)}...${data.fromUserAddress.substring(38)}</span>
                            </div>
                        </td>
                        <td class="p-5 text-right">
                            <div class="flex flex-col items-end gap-1">
                                <span class="font-black text-white">${valueCost}</span>
                                <span class="px-2 py-1 rounded text-[10px] font-bold ${data.badgeClass}">${data.type}</span>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                }
                lucide.createIcons();

            } catch (err) {
                console.error("Ledger rendering error:", err);
                document.getElementById('tx-table-body').innerHTML = '<tr><td colspan="6" class="p-20 text-center text-red-500 text-xs">Error communicating with network RPC logs.</td></tr>';
            }
        }

        window.addEventListener('load', loadTransactions);
    </script>
</body>
</html>

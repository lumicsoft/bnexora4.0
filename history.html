<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History | Bnexora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #9d34da;
            --secondary: #eb1e8c;
            --dark-bg: #0d0118;
            --card-bg: rgba(25, 10, 45, 0.7);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(157, 52, 218, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(235, 30, 140, 0.1) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
        }
        .table-row:hover { background: rgba(255, 255, 255, 0.03); }
        .badge-income {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .badge-upgrade {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .badge-spill {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
            <div>
                <h1 class="text-2xl font-black italic">TRANSACTION <span class="text-pink-500">HISTORY</span></h1>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-wider font-bold">Real-time Blockchain Ledger</p>
            </div>
            <a href="index1.html" class="glass-card px-6 py-2.5 text-xs font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-white/5 transition">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </a>
        </div>

        <!-- Transactions Table Card -->
        <div class="glass-card overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                <h3 class="font-bold flex items-center gap-2">
                    <i data-lucide="history" class="text-pink-500 w-5 h-5"></i>
                    All Income & System Logs
                </h3>
                <button onclick="loadTransactions()" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hover:text-white transition flex items-center gap-1">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> Refresh Logs
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase tracking-widest border-b border-white/5 bg-black/20">
                            <th class="p-5">#</th>
                            <th class="p-5">Level</th>
                            <th class="p-5">Date & Time</th>
                            <th class="p-5">Tx Hash</th>
                            <th class="p-5">User Address</th>
                            <th class="p-5 text-right">Income Type / Value</th>
                        </tr>
                    </thead>
                    <tbody id="tx-table-body">
                        <!-- Loading State -->
                        <tr>
                            <td colspan="6" class="p-20 text-center text-gray-500">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-pink-500"></div>
                                    <p class="text-xs font-bold uppercase tracking-widest">Reading Blockchain Events...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="web3-handler.js"></script>
    <script>
        async function loadTransactions() {
            if (typeof lucide !== 'undefined') lucide.createIcons();
            if (typeof init === 'function') await init();

            try {
                const userAddress = await signer.getAddress();
                const tableBody = document.getElementById('tx-table-body');
                tableBody.innerHTML = '';

                // Blockchain se past 5000 blocks ke events target karna
                const currentBlock = await provider.getBlockNumber();
                const fromBlock = currentBlock - 5000 > 0 ? currentBlock - 5000 : 0;

                // 1. Filters setup karna (Registration, Upgrade, Spillover)
                const filterReg = contract.filters.Registration(null, null, userAddress);
                const filterUpgrade = contract.filters.Upgrade(null, null, null);
                const filterSpill = contract.filters.Spillover(null, null, null, null, null);

                // Events query karna
                const logsReg = await contract.queryFilter(filterReg, fromBlock, currentBlock);
                const logsUpgrade = await contract.queryFilter(filterUpgrade, fromBlock, currentBlock);
                const logsSpill = await contract.queryFilter(filterSpill, fromBlock, currentBlock);

                // Saare logs ko ek single array mein combine karna
                let allEvents = [...logsReg, ...logsUpgrade, ...logsSpill];
                
                // Block numbers ke mutabik sort karna (Latest Pehle)
                allEvents.sort((a, b) => b.blockNumber - a.blockNumber);

                if (allEvents.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="p-20 text-center text-gray-500 text-xs">No recent contract events found.</td></tr>';
                    return;
                }

                let indexCounter = 1;

                for (let event of allEvents) {
                    const block = await provider.getBlock(event.blockNumber);
                    const txDate = new Date(block.timestamp * 1000);
                    
                    // Date aur Time formatted formats mein
                    const formattedDate = txDate.toLocaleDateString('en-US');
                    const formattedTime = txDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                    let levelDisplay = "Lvl 1";
                    let typeBadge = `<span class="px-2 py-1 rounded text-[10px] font-bold badge-income">Direct Income</span>`;
                    let userDisplay = event.args.userAddress || "0x...000";
                    
                    if (event.event === "Upgrade") {
                        levelDisplay = `Lvl ${event.args.level}`;
                        typeBadge = `<span class="px-2 py-1 rounded text-[10px] font-bold badge-upgrade">Level Upgrade</span>`;
                        userDisplay = await contract.idToAddress(event.args.userId);
                    } else if (event.event === "Spillover") {
                        levelDisplay = `Lvl ${event.args.level}`;
                        typeBadge = `<span class="px-2 py-1 rounded text-[10px] font-bold badge-spill">Spillover</span>`;
                        userDisplay = await contract.idToAddress(event.args.receiverId);
                    }

                    // Mapping cost matching from levels logic
                    let costText = "10.00 USDT";
                    if(event.args.level) {
                        try {
                            const costRaw = await contract.levelTokenCost(event.args.level);
                            costText = parseFloat(ethers.utils.formatUnits(costRaw, 18)).toFixed(2) + " USDT";
                        } catch(e) { costText = "-- USDT"; }
                    }

                    const row = document.createElement('tr');
                    row.className = 'table-row border-b border-white/5 text-xs transition';

                    row.innerHTML = `
                        <td class="p-5 font-bold text-gray-500">${String(indexCounter++).padStart(2, '0')}</td>
                        <td class="p-5 font-black text-pink-400">${levelDisplay}</td>
                        <td class="p-5">
                            <div class="flex flex-col">
                                <span class="font-bold">${formattedDate}</span>
                                <span class="text-[10px] text-gray-500 mt-0.5">${formattedTime}</span>
                            </div>
                        </td>
                        <td class="p-5 font-mono text-purple-400">
                            <a href="https://testnet.bscscan.com/tx/${event.transactionHash}" target="_blank" class="hover:underline">
                                ${event.transactionHash.substring(0,6)}...${event.transactionHash.substring(60)}
                            </a>
                        </td>
                        <td class="p-5 font-mono text-gray-400">
                            ${userDisplay.substring(0,6)}...${userDisplay.substring(38)}
                        </td>
                        <td class="p-5 text-right">
                            <div class="flex flex-col items-end gap-1">
                                <span class="font-black text-white">${costText}</span>
                                ${typeBadge}
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                }
                lucide.createIcons();

            } catch (err) {
                console.error("Transaction Page Load Error:", err);
                document.getElementById('tx-table-body').innerHTML = '<tr><td colspan="6" class="p-20 text-center text-red-500 text-xs">Error fetching ledger data from blockchain.</td></tr>';
            }
        }

        window.addEventListener('load', loadTransactions);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Explorer | Bnexora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #9d34da; --secondary: #eb1e8c; --dark-bg: #0d0118; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            background-image: radial-gradient(circle at 50% 0%, rgba(157, 52, 218, 0.1) 0%, transparent 50%);
        }
        .glass-card {
            background: rgba(25, 10, 45, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }
        .team-node { border-left: 2px solid rgba(235, 30, 140, 0.3); margin-left: 20px; padding-left: 15px; }
        .member-card { transition: all 0.3s ease; cursor: pointer; }
        .member-card:hover { background: rgba(255, 255, 255, 0.05); transform: translateX(5px); }
        .level-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black italic">NETWORK <span class="text-pink-500">EXPLORER</span></h1>
                <p class="text-gray-500 text-xs uppercase tracking-widest font-bold">Deep Team Analysis</p>
            </div>
            <a href="index1.html" class="glass-card px-5 py-2 text-xs font-bold flex items-center gap-2 hover:scale-105 transition">
                <i data-lucide="home" class="w-4 h-4"></i> Home
            </a>
        </div>

        <!-- Explorer Container -->
        <div class="glass-card p-6 min-h-[500px]">
            <div class="flex items-center gap-3 mb-8 pb-4 border-b border-white/5">
                <div class="w-10 h-10 rounded-full bg-pink-500 flex items-center justify-center font-black">YOU</div>
                <div>
                    <p class="text-sm font-bold" id="my-address">Connecting...</p>
                    <p class="text-[10px] text-emerald-400 font-black">Level 0 (Root)</p>
                </div>
            </div>

            <!-- Root Team List -->
            <div id="network-root" class="space-y-4">
                <div class="flex flex-col items-center py-20 text-gray-500">
                    <div class="animate-pulse bg-white/5 w-full h-12 rounded-xl mb-3"></div>
                    <div class="animate-pulse bg-white/5 w-full h-12 rounded-xl mb-3"></div>
                    <p class="text-xs font-bold tracking-widest uppercase">Fetching Lineage...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="web3-handler.js"></script>
    <script>
        const MAX_DEPTH = 3; // Kitne level deep jana hai

        async function initExplorer() {
            lucide.createIcons();
            if (typeof init === 'function') await init();
            
            const address = await signer.getAddress();
            document.getElementById('my-address').innerText = address.substring(0,10) + "..." + address.substring(32);
            
            // Start exploring from your address
            loadSubTeam(address, document.getElementById('network-root'), 1);
        }

        async function loadSubTeam(parentAddress, container, currentDepth) {
            if (currentDepth > MAX_DEPTH) return;

            try {
                // 1. Get Directs of this address
                const partners = await contract.getDirectPartnerAddresses(parentAddress);
                container.innerHTML = ''; // Clear loading state

                if (partners.length === 0) {
                    container.innerHTML = `<p class="text-[10px] text-gray-600 italic py-2">No partners in this line</p>`;
                    return;
                }

                for (let partnerAddr of partners) {
                    const details = await contract.getUserDetailsByAddress(partnerAddr);
                    
                    const node = document.createElement('div');
                    node.className = "mb-4";
                    
                    const cardId = `card-${partnerAddr}`;
                    const subContainerId = `sub-${partnerAddr}`;

                    node.innerHTML = `
                        <div class="member-card glass-card p-4 flex items-center justify-between mb-2" id="${cardId}">
                            <div class="flex items-center gap-4">
                                <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-pink-500 font-black text-xs">
                                    #${details.id}
                                </div>
                                <div>
                                    <p class="text-xs font-mono text-gray-300">${partnerAddr.substring(0,6)}...${partnerAddr.substring(36)}</p>
                                    <div class="flex gap-2 mt-1">
                                        <span class="level-badge bg-blue-500/20 text-blue-400">Lvl ${details.activeSlotsCount}</span>
                                        <span class="level-badge bg-purple-500/20 text-purple-400">Team: ${details.teamSize}</span>
                                    </div>
                                </div>
                            </div>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 arrow-icon"></i>
                        </div>
                        <div id="${subContainerId}" class="team-node hidden">
                            <p class="text-[10px] text-gray-500 animate-pulse">Loading Sub-Team...</p>
                        </div>
                    `;

                    container.appendChild(node);

                    // Add click event to toggle sub-team
                    document.getElementById(cardId).onclick = (e) => {
                        const subContainer = document.getElementById(subContainerId);
                        const arrow = node.querySelector('.arrow-icon');
                        
                        if (subContainer.classList.contains('hidden')) {
                            subContainer.classList.remove('hidden');
                            arrow.style.transform = "rotate(180deg)";
                            // Recursive call to load next level
                            loadSubTeam(partnerAddr, subContainer, currentDepth + 1);
                        } else {
                            subContainer.classList.add('hidden');
                            arrow.style.transform = "rotate(0deg)";
                        }
                    };
                }
                lucide.createIcons();

            } catch (err) {
                console.error("Explorer Error:", err);
            }
        }

        window.addEventListener('load', initExplorer);
    </script>
</body>
</html>
